serenity {

  project.name = "SerenityBDD Appium Mobile Automation"

  take.screenshots = BEFORE_AND_AFTER_EACH_STEP

  restart.browser.for.each = feature
  outputDirectory = "target/site/serenity"
}

environments {
    chrome {
        #webdriver.chrome.driver=./drivers/chromedriver/chrome-win64/chrome.exe
        webdriver {
          driver = chrome
          autodownload = true

          capabilities {
            browserName = "chrome"
            acceptInsecureCerts = true
            "goog:chromeOptions"{
                args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1000,800",
                      "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
                      "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"]
            }
          }
        }
    }
    android {
        webdriver {
            driver = appium
        }
        appium {
            hub = "http://localhost:4723/"
            platformName = Android
            deviceName = Pixel 9a
            "appium:platformVersion" = "16"
            appPackage = "com.google.android.youtube"
            appActivity = "com.google.android.youtube.HomeActivity"
            automationName = UIAutomator2
            noReset = false
            fullReset = false
            "appium:uiautomator2ServerInstallTimeout" = 60000
            autoGrantPermissions = true
        }
    }

    ios {
        webdriver {
            driver = appium
        }
        appium {
            hub = "http://127.0.0.1:4723/"
            platformName = "iOS"
            deviceName = "iPhone 12 Pro Max"
            platformVersion = "18.3.2"
            udid = "00008101-0015254A36A0001E"
            bundleId = "com.google.ios.youtube"
            autoAcceptAlerts = true
            browserName = " "
            noReset = true
            automationName = "XCUITest"
            "appium:wdaLocalPort" = "8200"
        }
    }
}